<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Spill</title>
</head>
<body>
    <nav><a href="index.html">Tilbake til Hjem</a></nav>
    <div class="card">
        <div class="header yellow">Click Challenge</div>

    <div class="card">
        <div class="header purple">Leaderboard</div>
        <div class="content">
            <table id="leaderboard"></table>
        </div>
    </div>
    <script src="script.js"></script>
    <script>window.onload = loadLeaderboard;</script>
</body>
