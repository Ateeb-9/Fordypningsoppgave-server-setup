<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Logg inn</title>
</head>
<body>
    <div class="container">
        <div id="loginForm">
            <h2>Logg inn</h2>
            <input type="email" id="loginEmail" placeholder="E-post">
            <input type="password" id="loginPass" placeholder="Passord">
            <button onclick="handleLogin()">Logg inn</button>
            <p onclick="toggleForm()">Ingen bruker? Registrer deg her</p>
        </div>
        <div id="regForm" style="display:none;">
            <h2>Registrer deg</h2>
            <input type="text" id="regUser" placeholder="Brukernavn">
            <input type="email" id="regEmail" placeholder="E-post">
            <input type="password" id="regPass" placeholder="Passord">
            <button onclick="handleRegister()">Opprett konto</button>
            <p onclick="toggleForm()">Har du bruker? Logg inn</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
